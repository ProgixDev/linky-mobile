# CUJ-002: driver views assigned deliveries (docs/quality/critical-user-journeys.md)
# Deterministic E2E gate; Argent covers the exploratory rest.
#
# PREREQUISITES (why this is deferred in environments without them):
#   - a booted iOS simulator with the dev build installed (macOS only),
#   - a SEEDED livreur account on the shared Supabase backend (set the env below), and
#   - otp-request in STUB mode (echoes a dev_code) so the OTP sign-in is deterministic —
#     the screen auto-fills the dev code. With real email, drive sign-in via Argent.
appId: com.linky.driver.dev
env:
  DRIVER_EMAIL: driver@example.com
---
- launchApp:
    clearState: true
# Cold start is unauthenticated → the auth guard shows the sign-in (email OTP) screen.
- assertVisible:
    id: 'auth-email'
- tapOn:
    id: 'auth-email'
- inputText: ${DRIVER_EMAIL}
- tapOn:
    id: 'auth-request-code'
# Stub mode: the dev code auto-fills the code step; verify to authenticate.
- assertVisible:
    id: 'auth-code'
- tapOn:
    id: 'auth-verify'
# Lands on the driver's home: the deliveries worklist. List OR empty state is valid.
- assertVisible:
    id: 'deliveries-screen'
- assertVisible:
    id: 'deliveries-count'
# Pull to refresh.
- swipe:
    start: 50%, 35%
    end: 50%, 80%
- assertVisible:
    id: 'deliveries-screen'
