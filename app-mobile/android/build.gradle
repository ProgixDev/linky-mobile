// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    // Phase X.6 — Google Services Gradle plugin. Reads
    // android/app/google-services.json at build time and writes the
    // Firebase/FCM config into the generated values. Without this,
    // expo-notifications can't deliver FCM pushes on a `gradlew
    // assembleRelease` standalone build. The plugin is a no-op until
    // the user drops google-services.json into android/app/ (Firebase
    // Console -> add Android app with package com.linky.app -> download
    // -> drop in). See PUSH_SETUP.md.
    classpath('com.google.gms:google-services:4.4.2')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
